---
# Установка Jenkins (LTS) с Java 17 и Go
- name: Установка Jenkins, Go и Docker
  hosts: jenkins
  become: yes
  vars:
    go_version: "1.22.5"
    go_arch: "linux-amd64"

  tasks:
    - name: Удаление старых настроек Jenkins (если есть)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/jenkins.list
        - /usr/share/keyrings/jenkins-keyring.asc
        - /etc/apt/keyrings/jenkins-keyring.asc

    - name: Обновление кэша пакетов
      apt:
        update_cache: yes

    - name: Установка fontconfig и OpenJDK 17
      apt:
        name:
          - fontconfig
          - openjdk-17-jre
        state: present

    - name: Создание директории для ключей APT
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Скачивание НОВОГО GPG-ключа Jenkins (2026)
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: '0644'

    - name: Добавление репозитория Jenkins
      copy:
        content: |
          deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/
        dest: /etc/apt/sources.list.d/jenkins.list
        mode: '0644'

    - name: Обновление кэша после добавления репозитория
      apt:
        update_cache: yes
      timeout: 120  # максимум 2 минуты

    - name: Установка Jenkins
      apt:
        name: jenkins
        state: present

    - name: Установка Go
      block:
        - name: Скачивание Go
          get_url:
            url: "https://go.dev/dl/go{{ go_version }}.{{ go_arch }}.tar.gz"
            dest: "/tmp/go.tar.gz"
            mode: '0644'

        - name: Распаковка Go в /usr/local
          unarchive:
            src: "/tmp/go.tar.gz"
            dest: "/usr/local"
            remote_src: yes
            creates: /usr/local/go/bin/go

        - name: Добавление Go в PATH через /etc/profile.d/
          copy:
            content: 'export PATH=$PATH:/usr/local/go/bin'
            dest: /etc/profile.d/go.sh
            mode: '0644'

    - name: Установка зависимостей для Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Добавление GPG-ключа Docker
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        executable: /bin/bash

    - name: Добавление репозитория Docker
      shell: |
        . /etc/os-release
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $VERSION_CODENAME stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        executable: /bin/bash

    - name: Установка Docker
      apt:
        update_cache: yes
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Добавление пользователей в группу docker
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - dima
        - jenkins

    - name: Запуск и включение Jenkins
      systemd:
        name: jenkins
        state: started
        enabled: yes

# Установка Nexus Repository Manager
- name: Установка Nexus через Docker
  hosts: nexus
  become: yes

  tasks:
    - name: Установка зависимостей для Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Добавление GPG-ключа Docker
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        executable: /bin/bash

    - name: Добавление репозитория Docker
      shell: |
        . /etc/os-release
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $VERSION_CODENAME stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        executable: /bin/bash

    - name: Установка Docker
      apt:
        update_cache: yes
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Добавление пользователя dima в группу docker
      user:
        name: dima
        groups: docker
        append: yes

    - name: Запуск Nexus в Docker-контейнере
      docker_container:
        name: nexus
        image: sonatype/nexus3
        ports:
          - "8081:8081"
          - "8082:8082"
        env:
          INSTALL4J_ADD_VM_PARAMS: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=273m"
        restart_policy: unless-stopped